name: Extract linuxfs squashfs

on:
  workflow_dispatch:
    inputs:
      linuxfs_path:
        description: Path to the squashfs file in the repo
        required: true
        default: antix-extracted/antiX/linuxfs
      output_dir:
        description: Directory inside the repo for the unsquashed live filesystem
        required: true
        default: antix-livefs

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs squashfs-tools
          git lfs install --local

      - name: Validate inputs
        env:
          LINUXFS_PATH: ${{ inputs.linuxfs_path }}
          OUTPUT_DIR: ${{ inputs.output_dir }}
        run: |
          case "$LINUXFS_PATH" in
            ""|"."|"/"|.git|.github|*".."*)
              echo "Refusing unsafe linuxfs_path: $LINUXFS_PATH" >&2
              exit 1
              ;;
          esac

          case "$OUTPUT_DIR" in
            ""|"."|"/"|.git|.github|*".."*)
              echo "Refusing unsafe output_dir: $OUTPUT_DIR" >&2
              exit 1
              ;;
          esac

          if [ ! -f "$LINUXFS_PATH" ]; then
            echo "linuxfs file not found at $LINUXFS_PATH" >&2
            exit 1
          fi

      - name: Pull linuxfs from Git LFS
        env:
          LINUXFS_PATH: ${{ inputs.linuxfs_path }}
        run: |
          git lfs pull --include "$LINUXFS_PATH"

      - name: Unsquash live filesystem
        env:
          LINUXFS_PATH: ${{ inputs.linuxfs_path }}
          OUTPUT_DIR: ${{ inputs.output_dir }}
        run: |
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          unsquashfs -d "$OUTPUT_DIR" "$LINUXFS_PATH"

      - name: Track large extracted files with Git LFS
        env:
          OUTPUT_DIR: ${{ inputs.output_dir }}
        run: |
          found=0
          while IFS= read -r -d '' file; do
            git lfs track "$file"
            found=1
          done < <(find "$OUTPUT_DIR" -type f -size +95M -print0)

          if [ "$found" -eq 1 ] && [ -f .gitattributes ]; then
            git add .gitattributes
          fi

      - name: Commit unsquashed live filesystem
        env:
          OUTPUT_DIR: ${{ inputs.output_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No live filesystem changes to commit."
            exit 0
          fi

          git commit -m "Extract linuxfs into $OUTPUT_DIR"
          git push origin "HEAD:${GITHUB_REF_NAME}"
