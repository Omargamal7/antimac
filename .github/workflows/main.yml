name: Build antiMac MBA6,2 release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: antimac-mba62-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OUT_ISO: ${{ github.workspace }}/antimac-live.iso
      OUT_IMG: ${{ github.workspace }}/antimac-installed.img
      OUT_ZIP: ${{ github.workspace }}/antimac-mba6.2-release.zip
      REPORT_PATH: ${{ github.workspace }}/Build_Report.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Free workspace space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso qemu-utils zip parted dosfstools rsync curl

      - name: Build release
        run: |
          chmod +x scripts/build_mba62_release.sh
          ./scripts/build_mba62_release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antimac-mba62-release
          path: |
            ${{ env.OUT_ISO }}
            ${{ env.OUT_IMG }}
            ${{ env.OUT_ZIP }}
            ${{ env.REPORT_PATH }}
          retention-days: 30
