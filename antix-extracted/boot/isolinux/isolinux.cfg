#--------------------------------------------------------------------
# This is the isolinux.cfg and/or syslinux.cfg file
# It controls the main menu in the bootloader on the live system.
# You can edit it to change the main bootloader menu on a LiveUSB.
# If you are not careful you can break the live system and prevent
# it from booting.
#--------------------------------------------------------------------

UI gfxboot gfx-cpio readme.msg
timeout 3000

default

MENU TITLE Welcome to antiX-26_x64-core (Stephen Kapos)

LABEL live
    MENU LABEL antiX-26_x64-core (28 January 2026)
    KERNEL /antiX/vmlinuz
    APPEND quiet
    INITRD /antiX/initrd.gz

### init-diversity menu entries (delete the the ones that aren't needed) ###

LABEL runit
    MENU LABEL antiX-26_x64-core (runit)
    KERNEL /antiX/vmlinuz
    APPEND quiet init=/sbin/init-runit
    INITRD /antiX/initrd.gz 

LABEL sysVinit
    MENU LABEL antiX-26_x64-core (sysvinit)
    KERNEL /antiX/vmlinuz
    APPEND quiet init=/sbin/init-sysvinit
    INITRD /antiX/initrd.gz 

LABEL dinit
    MENU LABEL antiX-26_x64-core (dinit)
    KERNEL /antiX/vmlinuz
    APPEND quiet init=/sbin/init-dinit
    INITRD /antiX/initrd.gz 

LABEL s6-rc
    MENU LABEL antiX-26_x64-core (s6-rc)
    KERNEL /antiX/vmlinuz
    APPEND quiet init=/sbin/init-s6-rc
    INITRD /antiX/initrd.gz

LABEL s6-66
    MENU LABEL antiX-26_x64-core (s6-66)
    KERNEL /antiX/vmlinuz
    APPEND quiet init=/sbin/init-s6-66
    INITRD /antiX/initrd.gz

LABEL safe
    MENU LABEL Safe_Video_Mode
    KERNEL /antiX/vmlinuz
    APPEND quiet xorg=safe
    INITRD /antiX/initrd.gz

LABEL vbox
    MENU LABEL Virtual_Box_Video
    KERNEL /antiX/vmlinuz
    APPEND quiet video=1280x1024
    INITRD /antiX/initrd.gz

LABEL failsafe
    MENU LABEL Failsafe_Boot
    KERNEL /antiX/vmlinuz
    APPEND quiet failsafe
    INITRD /antiX/initrd.gz

LABEL harddisk
    MENU LABEL Boot_from_Hard_Disk
    COM32 chain.c32
    APPEND hd0

LABEL memtest
    MENU LABEL Memory_Test
    KERNEL /boot/memtest

LABEL grub
    MENU LABEL Switch_to_Grub_Bootloader
    KERNEL /boot/grub/i386-pc/lnxboot.img
    INITRD /boot/grub/i386-pc/core.img
